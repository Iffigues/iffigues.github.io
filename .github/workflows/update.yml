name: Sync 42 Data
on:
  workflow_dispatch: # Le bouton magique dans l'onglet Actions

jobs:
  update:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Fetch Script
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: node fetch_42_data.js

      - name: Commit changes
        run: |
          git config --global user.name '42-Data-Bot'
          git config --global user.email 'bot@42.fr'
          # On vérifie si le fichier a bien été créé avant de tenter un commit
          if [ -f _data/denoyelle.json ]; then
            git add _data/denoyelle.json
            git commit -m "Manual sync of 42 profile data" || echo "No changes to commit"
            git push
          else
            echo "Erreur : Le fichier JSON n'a pas été généré."
            exit 1
          fi